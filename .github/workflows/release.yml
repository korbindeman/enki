name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-13
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - name: Package binary
        run: |
          cd target/release
          tar czf enki-${{ matrix.target }}.tar.gz enki
      - uses: actions/upload-artifact@v4
        with:
          name: enki-${{ matrix.target }}
          path: target/release/enki-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            artifacts/*.tar.gz

      - name: Update Homebrew tap
        env:
          SSH_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"

          arm_sha=$(shasum -a 256 artifacts/enki-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)
          x86_sha=$(shasum -a 256 artifacts/enki-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)

          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/tap_deploy_key
          chmod 600 ~/.ssh/tap_deploy_key
          echo -e "Host github.com\n  IdentityFile ~/.ssh/tap_deploy_key\n  StrictHostKeyChecking accept-new" >> ~/.ssh/config

          git clone git@github.com:korbindeman/homebrew-tap.git tap

          cat > tap/Formula/enki.rb << FORMULA
          class Enki < Formula
            desc "Multi-agent coding orchestrator"
            homepage "https://github.com/korbindeman/enki"
            version "${version}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/korbindeman/enki/releases/download/${TAG}/enki-aarch64-apple-darwin.tar.gz"
                sha256 "${arm_sha}"
              else
                url "https://github.com/korbindeman/enki/releases/download/${TAG}/enki-x86_64-apple-darwin.tar.gz"
                sha256 "${x86_sha}"
              end
            end

            depends_on :macos

            def install
              bin.install "enki"
            end

            test do
              assert_match "enki", shell_output("#{bin}/enki --help")
            end
          end
          FORMULA

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/enki.rb
          git commit -m "enki ${TAG}"
          git push
